# Smoke config — proves the wiring end-to-end on a real model bundle
# before the headline trajectory_sweep.yaml is launched. Two
# conditions, three trajectory points, one budget, one repeat = six
# cells. On a single A10G with Gemma-4-E4B this should finish in
# under fifteen minutes.

name: cliff_smoke
schema_version: 1
seed: 20260420
repeats: 1

conditions:
  - summarization_baseline
  - dpm_projection

trajectory_chars:
  - 4000
  - 8000
  - 16000

memory_budget_chars:
  - 5352

model_class: gqa
kv_dtype: fp16
kv_dtype_policy_replay_safe: true
